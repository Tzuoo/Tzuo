<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tzuo</title>
<style>
:root{
  --bg:#0f1117;--panel:#1a1d27;--panel2:#22263a;--line:#2e3450;
  --text:#e8eaf6;--muted:#8790ae;--blue:#60a5fa;--green:#34d399;
  --yellow:#fbbf24;--red:#f87171;--purple:#c084fc;--accent:#4f7cff;--font-scale:1;
  --header:#0f1117;--field:#111522;--button:#151928;--disabled:#0d1018;
  --on-control:#fff;--title:#9db5ff;--panel-title:#c7d2fe;--highlight:#bfdbfe;
  --total-head:rgba(79,124,255,.12);--total-grand:rgba(79,124,255,.17);--shadow:rgba(0,0,0,.28);
}
[data-theme="light"]{
  --bg:#f5f0e8;--panel:#fffdf9;--panel2:#edeafb;--line:#c9c4dc;
  --text:#25253a;--muted:#68677c;--blue:#315fbd;--green:#16806c;
  --yellow:#b76a16;--red:#c34f5b;--purple:#8053b8;--accent:#586fc4;
  --header:#fff8ef;--field:#fffaf2;--button:#f0edf9;--disabled:#e9e5e0;
  --on-control:#25253a;--title:#6950a1;--panel-title:#4d4779;--highlight:#405ca3;
  --total-head:rgba(88,111,196,.12);--total-grand:rgba(88,111,196,.17);--shadow:rgba(74,65,105,.18);
}
[data-theme="light"] body{
  background:
    radial-gradient(circle at 8% 2%,rgba(255,210,172,.34),transparent 28%),
    radial-gradient(circle at 92% 8%,rgba(192,202,255,.36),transparent 30%),
    var(--bg);
}
[data-theme="light"] header{background:linear-gradient(105deg,#fff5e8 0%,#f4f0ff 52%,#ebf6f3 100%)}
[data-theme="light"] .display-tools button{background:rgba(255,255,255,.66);box-shadow:0 2px 6px rgba(74,65,105,.09)}
[data-theme="light"] .tab.active{background:linear-gradient(180deg,#fffdf9,#ece8fa);border-color:#bdb6d8;color:#4a3e73}
[data-theme="light"] .panel{border-color:#c5bfd9;box-shadow:0 7px 22px var(--shadow)}
[data-theme="light"] .panel-head{background:linear-gradient(90deg,#e9e7fa,#eeeaf7 55%,#e2f1ee)}
[data-theme="light"] .number-display,
[data-theme="light"] .price,
[data-theme="light"] .pillar{box-shadow:inset 0 1px 3px rgba(90,73,48,.07)}
[data-theme="light"] .mode-btn.active{background:#fff5df;box-shadow:0 0 0 2px rgba(183,106,22,.13)}
[data-theme="light"] .calc-card:first-child{background:linear-gradient(135deg,#f3ecff,#fff8f1);border-color:#d7c8eb}
[data-theme="light"] .calc-card:nth-child(2){background:linear-gradient(135deg,#e9f7f2,#fffaf0);border-color:#bfddd3}
[data-theme="light"] .card-title{background:linear-gradient(90deg,#ece9fa,#e6f3f0);color:#514d73}
[data-theme="light"] .total-grand{background:linear-gradient(90deg,#e3e9fb,#e9f3f1);color:#334f91}
[data-theme="light"] .total-head{background:linear-gradient(90deg,#f0ecfa,#eaf3f4)}
[data-theme="light"] .key-binding,
[data-theme="light"] .key-add{box-shadow:0 2px 5px rgba(74,65,105,.08)}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif}
button,input{font:inherit}
button{cursor:pointer}
header{position:sticky;top:0;z-index:1000;background:var(--header);border-bottom:1px solid var(--line);padding:10px 12px 0}
h1{margin:0 0 8px;text-align:center;font-size:16px;color:var(--title)}
.tabs{display:flex;justify-content:center;gap:5px;flex-wrap:wrap}
.display-tools{display:flex;justify-content:center;align-items:center;gap:6px;padding:0 0 7px}
.display-tools button{min-width:38px;padding:5px 9px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);color:var(--on-control);font-weight:800}
.display-tools .font-value{min-width:58px;color:var(--highlight);text-align:center;font-weight:800}
.tab{padding:8px 18px;border:1px solid transparent;border-bottom:0;border-radius:8px 8px 0 0;background:transparent;color:var(--muted)}
.tab.active{background:var(--panel);border-color:var(--line);color:var(--on-control)}
.badge{display:none;margin-left:4px;padding:1px 6px;border-radius:8px;background:var(--accent);color:#fff;font-size:10px}
.page{display:none;padding:10px 10px 80px}
.page.active{display:block}
.workspace{position:relative;min-height:1050px}
.panel{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 4px 18px var(--shadow);min-width:280px;overflow:hidden}
.panel-head{height:36px;padding:0 10px;background:var(--panel2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;cursor:grab;touch-action:none;user-select:none}
.panel-title{font-size:12px;font-weight:800;letter-spacing:1px;color:var(--panel-title)}
.collapse{width:23px;height:23px;border:0;border-radius:5px;background:transparent;color:var(--muted);font-size:15px}
.panel-body{padding:11px}
.panel.collapsed{height:36px!important;min-height:36px!important}
.panel.collapsed .panel-body,.panel.collapsed .resize{display:none}
.resize{position:absolute;right:0;bottom:0;width:27px;height:27px;display:flex;align-items:flex-end;justify-content:flex-end;padding:3px;color:var(--muted);cursor:se-resize;touch-action:none;user-select:none}
.section{padding:8px 0;border-bottom:1px solid var(--line)}
.section:last-child{border-bottom:0}
.section-title{margin-bottom:7px;font-size:11px;font-weight:700;color:var(--muted)}
.mode-row,.control-row,.price-row,.actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.mode-btn{flex:1;min-width:100px;padding:10px;border:1px solid var(--line);border-radius:9px;background:var(--button);color:var(--muted);font-weight:800}
.mode-btn.active{border-color:var(--yellow);color:var(--on-control);box-shadow:0 0 0 2px rgba(251,191,36,.15)}
.control{display:flex;align-items:center;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--panel2)}
.control button{width:30px;height:30px;border:0;background:transparent;color:var(--on-control)}
.control span{padding:0 5px;font-size:11px;color:var(--muted)}
.direct{width:36px;border:0;outline:0;background:transparent;color:var(--blue);text-align:center;font-weight:800}
.number-display{width:100%;min-height:78px;padding:12px;border:2px solid var(--line);border-radius:12px;background:var(--field);display:flex;align-items:center;justify-content:center;text-align:center;font-family:Consolas,monospace;font-size:48px;font-weight:800;line-height:1.16;overflow-wrap:anywhere;word-break:break-word}
.number-display.focused{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(251,191,36,.14)}
.pillar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:8px 0}
.pillar{min-height:52px;border:2px solid var(--line);border-radius:9px;background:var(--field);color:var(--on-control);font-family:Consolas,monospace;font-size:21px;font-weight:800}
.pillar.active{border-color:var(--yellow)}
.preview{margin-top:8px;line-height:1.9;font-size:12px;color:var(--muted)}
.price-row{margin-bottom:6px}
.price-row label{width:45px;font-size:12px;font-weight:700}
.price{flex:1;min-width:90px;padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--field);color:var(--on-control);text-align:right;font-family:Consolas,monospace}
.price-row.disabled{opacity:.38}
.price-row.disabled .price{cursor:not-allowed;background:var(--disabled);color:var(--muted)}
.actions button{flex:1;padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--on-control)}
.actions .primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:800}
.actions .danger{color:var(--red)}
.star-summary{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:13px;font-weight:700}
.calc-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:8px 0}
.calc-card{padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--field)}
.calc-card-title{margin-bottom:6px;font-weight:800}
.calc-card-value{font-family:Consolas,monospace;font-size:calc(26px * var(--font-scale));font-weight:800}
.calc-card-note{margin-top:5px;color:var(--muted);font-size:calc(11px * var(--font-scale));line-height:1.6}
.car-layout .calc-cards{margin:6px 0}
.car-layout .calc-card{display:grid;grid-template-columns:auto 1fr;column-gap:10px;align-items:center;padding:8px 10px}
.car-layout .calc-card-title{margin:0}
.car-layout .calc-card-value{font-size:calc(21px * var(--font-scale));text-align:right}
.car-layout .calc-card-note{grid-column:1/-1;margin-top:3px;line-height:1.35}
.car-layout .number-display{min-height:58px;padding:7px}
.car-layout .section{padding:6px 0}
.total-head,.total-row{display:flex;align-items:center;gap:4px;padding:6px;border-bottom:1px solid var(--line)}
.total-head{background:var(--total-head);font-weight:800}
.total-grand{display:flex;justify-content:space-between;padding:9px;background:var(--total-grand);border-bottom:2px solid var(--accent);color:var(--highlight);font-weight:800}
.cell-index{width:28px;flex:none;color:var(--muted);font-size:11px}
.cell-star{flex:1;text-align:right;font-family:Consolas,monospace;font-size:12px}
.delete{width:24px;height:24px;border:0;background:transparent;color:var(--muted);font-size:17px}
.empty{padding:18px;text-align:center;color:var(--muted);font-size:12px}
.list-wrap{max-width:850px;margin:auto}
.list-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card{margin-bottom:10px;border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden}
.card-title{padding:8px 12px;background:var(--panel2);color:var(--muted);font-size:11px;font-weight:800}
.list-item{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
.list-main{flex:1}
.tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:800}
.tag.lp{background:rgba(96,165,250,.16);color:var(--blue)}
.tag.pi{background:rgba(52,211,153,.16);color:var(--green)}
.tag.car{background:rgba(192,132,252,.16);color:var(--purple)}
.desc{margin:3px 0;font-family:Consolas,monospace;font-size:13px}
.details{line-height:1.8;color:var(--muted);font-size:12px}
.list-total-row{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--line)}
.key-intro{padding:12px;color:var(--muted);font-size:12px;line-height:1.7}
.key-row{display:grid;grid-template-columns:minmax(110px,180px) 1fr;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line)}
.key-label{font-weight:800;font-size:13px}
.key-bindings{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.key-binding,.key-add{padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--field);color:var(--highlight)}
.key-binding{display:inline-flex;gap:8px;align-items:center}
.key-remove{color:var(--muted);font-weight:800}
.key-add{color:var(--green)}
.key-actions{display:flex;justify-content:flex-end;padding:12px}
.key-capture{position:fixed;inset:0;z-index:4000;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.68)}
.key-capture.open{display:flex}
.key-capture-box{width:min(380px,100%);padding:24px;border:1px solid var(--line);border-radius:14px;background:var(--panel);text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.45)}
.key-capture-title{font-size:18px;font-weight:800;color:var(--on-control)}
.key-capture-help{margin:10px 0 18px;color:var(--muted);font-size:13px;line-height:1.7}
.calculator{width:min(460px,100%);margin:auto;border:1px solid var(--line);border-radius:16px;background:var(--panel);box-shadow:0 8px 28px var(--shadow);overflow:hidden}
.calc-screen{display:grid;grid-template-rows:minmax(calc(30px * var(--font-scale)),auto) minmax(calc(66px * var(--font-scale)),auto);padding:12px 18px;background:var(--field);border-bottom:1px solid var(--line);text-align:right}
.calc-expression{display:flex;align-items:center;justify-content:flex-end;min-width:0;padding-bottom:7px;border-bottom:1px solid var(--line);color:var(--muted);font-family:Consolas,monospace;font-size:calc(14px * var(--font-scale));line-height:1.35;white-space:nowrap;overflow-x:auto;overflow-y:hidden}
.calc-display{display:flex;align-items:center;justify-content:flex-end;min-width:0;padding-top:8px;line-height:1.15;white-space:nowrap;overflow-x:auto;overflow-y:hidden;font-family:Consolas,monospace;font-size:calc(38px * var(--font-scale));font-weight:800}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:12px}
.calc-key{min-height:58px;border:1px solid var(--line);border-radius:10px;background:var(--button);color:var(--on-control);font-size:calc(20px * var(--font-scale));font-weight:800}
.calc-key:hover,.calc-key:focus{border-color:var(--accent)}
.calc-key.operator{background:var(--panel2);color:var(--highlight)}
.calc-key.clear{color:var(--red)}
.calc-key.equals{background:var(--accent);border-color:var(--accent);color:#fff}
.calc-note{padding:0 14px 14px;color:var(--muted);font-size:calc(11px * var(--font-scale));text-align:center}
[data-theme="light"] .calculator{background:rgba(255,253,249,.92)}
[data-theme="light"] .calc-screen{background:linear-gradient(135deg,#fff8ec,#f0edff)}
[data-theme="light"] .calc-key.operator{background:linear-gradient(135deg,#ece9fa,#e7f3f0)}
.status{position:fixed;left:50%;top:72px;z-index:3000;transform:translateX(-50%);display:none;padding:8px 14px;border-radius:8px;background:#047857;color:#fff;font-size:13px;font-weight:800}
h1{font-size:calc(16px * var(--font-scale))}
.tab,.display-tools,.mode-btn,.actions button,.key-binding,.key-add,.key-capture-help{font-size:calc(14px * var(--font-scale))}
.panel-title,.section-title,.preview,.price-row label,.details,.empty,.key-intro,.card-title{font-size:calc(12px * var(--font-scale))}
.direct,.price,.desc,.star-summary,.total-grand,.total-head,.total-row,.list-total-row,.key-label{font-size:calc(14px * var(--font-scale))}
.pillar{font-size:calc(21px * var(--font-scale))}
.number-display{font-size:calc(48px * var(--font-scale))}
.badge,.tag{font-size:calc(10px * var(--font-scale))}
.cell-index,.cell-star{font-size:calc(12px * var(--font-scale))}
@media(max-width:900px){
  .tab{flex:1;padding:8px 3px}
  .workspace{min-height:1250px}
  .panel{min-width:250px}
  .pillar-grid{grid-template-columns:repeat(4,1fr)}
  .key-row{grid-template-columns:1fr}
  .calc-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <h1>Tzuo</h1>
  <div class="display-tools">
    <button id="fontDown" title="縮小字體">A−</button>
    <span id="fontValue" class="font-value">100%</span>
    <button id="fontUp" title="放大字體">A＋</button>
    <button id="fontReset" title="恢復預設字體">重設</button>
    <button id="themeToggle" title="切換深淺色模式">淺色</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-page="old">舊版輸入</button>
    <button class="tab" data-page="new">新版組數</button>
    <button class="tab" data-page="list">清單<span id="listBadge" class="badge"></span></button>
    <button class="tab" data-page="keys">快捷鍵</button>
    <button class="tab" data-page="calc">計算機</button>
  </div>
</header>

<main>
  <section id="page-old" class="page active"><div id="oldWorkspace" class="workspace"></div></section>
  <section id="page-new" class="page"><div id="newWorkspace" class="workspace"></div></section>
  <section id="page-list" class="page">
    <div class="list-wrap">
      <div class="list-toolbar"><span id="listCount">0 組</span><button id="clearAll" class="mode-btn" style="flex:none">清除全部</button></div>
      <div class="card"><div class="card-title">總計</div><div id="listTotals"></div></div>
      <div class="card"><div class="card-title">明細</div><div id="listDetails"></div></div>
    </div>
  </section>
  <section id="page-keys" class="page">
    <div class="list-wrap">
      <div class="card">
        <div class="card-title">快捷鍵設定</div>
        <div class="key-intro">點選鍵位即可重新設定；同一功能可保留多個鍵位。設定會自動保存，電腦與外接 F20 鍵盤都以實際按下的按鍵為準。</div>
        <div id="keySettings"></div>
        <div class="key-actions"><button id="resetKeys" class="mode-btn" style="flex:none">恢復預設鍵位</button></div>
      </div>
    </div>
  </section>
  <section id="page-calc" class="page">
    <div class="calculator">
      <div class="calc-screen">
        <div id="calcExpression" class="calc-expression"></div>
        <div id="calcDisplay" class="calc-display">0</div>
      </div>
      <div id="calcKeys" class="calc-grid">
        <button class="calc-key clear" data-calc="clear">AC</button>
        <button class="calc-key" data-calc="sign">±</button>
        <button class="calc-key" data-calc="percent">%</button>
        <button class="calc-key operator" data-calc="operator" data-value="/">÷</button>
        <button class="calc-key" data-calc="digit" data-value="7">7</button>
        <button class="calc-key" data-calc="digit" data-value="8">8</button>
        <button class="calc-key" data-calc="digit" data-value="9">9</button>
        <button class="calc-key operator" data-calc="operator" data-value="*">×</button>
        <button class="calc-key" data-calc="digit" data-value="4">4</button>
        <button class="calc-key" data-calc="digit" data-value="5">5</button>
        <button class="calc-key" data-calc="digit" data-value="6">6</button>
        <button class="calc-key operator" data-calc="operator" data-value="-">−</button>
        <button class="calc-key" data-calc="digit" data-value="1">1</button>
        <button class="calc-key" data-calc="digit" data-value="2">2</button>
        <button class="calc-key" data-calc="digit" data-value="3">3</button>
        <button class="calc-key operator" data-calc="operator" data-value="+">＋</button>
        <button class="calc-key clear" data-calc="backspace">⌫</button>
        <button class="calc-key" data-calc="digit" data-value="0">0</button>
        <button class="calc-key" data-calc="decimal">.</button>
        <button class="calc-key equals" data-calc="equals">＝</button>
      </div>
      <div class="calc-note">支援滑鼠、手機觸控、主鍵盤及數字鍵盤；計算結果不會加入任何清單或總計。</div>
    </div>
  </section>
</main>
<div id="status" class="status"></div>
<div id="keyCapture" class="key-capture">
  <div class="key-capture-box">
    <div id="keyCaptureTitle" class="key-capture-title">請按新按鍵</div>
    <div class="key-capture-help">可使用主鍵盤、數字鍵盤或組合鍵。按下後立即保存。</div>
    <button id="cancelKeyCapture" class="mode-btn">取消</button>
  </div>
</div>

<script>
(()=>{
'use strict';

const STATE_KEY='539_clean_v70_final_state';
const LAYOUT_KEY='539_clean_v70_final_layout';
const LEGACY_KEY='539appStatePersistent_mobile_v3';
const LEGACY_NEW_KEY='539_v27_count_only_integrated';
const COLORS={2:'#60a5fa',3:'#34d399',4:'#fbbf24',5:'#f87171',6:'#c084fc',7:'#38bdf8',8:'#a3e635',9:'#fb923c'};
const NAMES={2:'二星',3:'三星',4:'四星',5:'五星',6:'六星',7:'七星',8:'八星',9:'九星'};
const SHORTCUT_LABELS={
  modePair:'切換連碰',modePillar:'切換立柱',modeCar:'切換車',submit:'加入清單',
  next:'確認／下一欄',backspace:'退一碼',clearAll:'清除全部',
  digit0:'輸入數字 0',digit1:'輸入數字 1',digit2:'輸入數字 2',digit3:'輸入數字 3',digit4:'輸入數字 4',
  digit5:'輸入數字 5',digit6:'輸入數字 6',digit7:'輸入數字 7',digit8:'輸入數字 8',digit9:'輸入數字 9'
};
const DEFAULT_SHORTCUTS={
  modePair:['NumLock'],modePillar:['NumpadDivide','Slash'],modeCar:['NumpadMultiply','Shift+Digit8'],submit:['NumpadAdd','Shift+Equal'],
  next:['Enter','NumpadEnter','Tab'],backspace:['Backspace'],clearAll:['Escape'],
  digit0:['Digit0','Numpad0'],digit1:['Digit1','Numpad1'],digit2:['Digit2','Numpad2'],digit3:['Digit3','Numpad3'],digit4:['Digit4','Numpad4'],
  digit5:['Digit5','Numpad5'],digit6:['Digit6','Numpad6'],digit7:['Digit7','Numpad7'],digit8:['Digit8','Numpad8'],digit9:['Digit9','Numpad9']
};

const defaults={
  page:'old',
  list:[],
  nextId:1,
  fontScale:1,
  theme:'dark',
  shortcutVersion:2,
  shortcuts:DEFAULT_SHORTCUTS,
  old:{
    mode:'pair',focus:'qty',pair:{count:5,maxStar:4,buffer:'',prices:{}},

function clone(value){return JSON.parse(JSON.stringify(value));}
function loadJson(key,fallback){try{return JSON.parse(localStorage.getItem(key)||'null')||fallback}catch{return fallback}}
function cleanNumber(value){
  const text=String(value??'').replace(/,/g,'.').replace(/[^0-9.]/g,'');
  const dot=text.indexOf('.');
  return dot<0?text:text.slice(0,dot+1)+text.slice(dot+1).replace(/\./g,'');
}
function clamp(value,min,max,fallback){const n=parseInt(value,10);return Math.max(min,Math.min(max,Number.isFinite(n)?n:fallback));}
function combination(n,r){if(r<0||r>n)return 0;let x=1;for(let i=1;i<=r;i++)x=x*(n-r+i)/i;return Math.round(x);}
function combinations(values,r){
  let total=0;
  const walk=(start,depth,product)=>{
    if(depth===r){total+=product;return;}
    for(let i=start;i<values.length;i++)walk(i+1,depth+1,product*values[i]);
  };
  walk(0,0,1);return total;
}
function starsForPair(count,maxStar){
  const out={};for(let r=2;r<=Math.min(maxStar,count,9);r++)out[r]=combination(count,r);return out;
}
function starsForPillar(values,maxStar){
  const valid=values.filter(v=>v>0),out={};
  for(let r=2;r<=Math.min(maxStar,valid.length,9);r++)out[r]=combinations(valid,r);
  return out;
}
function doublesFor(count){
  const n=clamp(count,0,39,0);
  return Math.round(n*(39-n)*(38-n)/2);
}
function amountHundred(count,price){const p=parseFloat(price);return Number.isFinite(p)?count*p:null;}
function amountYuan(count,price){const h=amountHundred(count,price);return h===null?null:h*100;}
function fmt(value){return Number(value||0).toLocaleString('en-US',{maximumFractionDigits:8});}
function metricName(key){return key==='car'?'車':key==='double'?'化雙':NAMES[key]}
function metricColor(key){return key==='car'?'var(--purple)':key==='double'?'var(--green)':COLORS[key]}
function metricUnit(key){return key==='car'?'注':key==='double'?'注':'柱'}
function metricSort(a,b){
  const rank=key=>key==='car'?100:key==='double'?101:Number(key);
  return rank(a)-rank(b);
}
function safeItem(item,index){
  const stars=item?.stars&&typeof item.stars==='object'?{...item.stars}:{};
  const starPrices=item?.starPrices&&typeof item.starPrices==='object'?{...item.starPrices}:{};
  if(stars.pack!==undefined&&stars.double===undefined){stars.double=stars.pack;delete stars.pack}
  if(starPrices.pack!==undefined&&starPrices.double===undefined){starPrices.double=starPrices.pack;delete starPrices.pack}
  return {
    id:Number.isFinite(+item?.id)?+item.id:index+1,
    type:['pi','car'].includes(item?.type)?item.type:'lp',
    desc:String(item?.desc||'舊資料'),
    stars,starPrices
  };
}

function loadState(){
  const saved=loadJson(STATE_KEY,null);
  if(saved)return mergeState(saved);
  const next=clone(defaults);
  const legacy=loadJson(LEGACY_KEY,null);
  if(legacy){
    next.list=Array.isArray(legacy.listItems)?legacy.listItems.map(safeItem):[];
    next.nextId=Math.max(Number(legacy.listIdCounter)||1,...next.list.map(x=>x.id+1));
    if(Number.isFinite(+legacy.lpNum))next.old.pair.count=+legacy.lpNum;
    if(Number.isFinite(+legacy.lpStarMax))next.old.pair.maxStar=+legacy.lpStarMax;
    if(legacy.prices?.lp)next.old.pair.prices=legacy.prices.lp;
    if(Number.isFinite(+legacy.pcols))next.old.pillar.columns=+legacy.pcols;
    if(Number.isFinite(+legacy.maxNum))next.old.pillar.maxValue=+legacy.maxNum;
    if(Number.isFinite(+legacy.pStarMax))next.old.pillar.maxStar=+legacy.pStarMax;
    if(Array.isArray(legacy.pvals))next.old.pillar.values=legacy.pvals.slice(0,10).map(v=>+v||0);
    if(legacy.prices?.p)next.old.pillar.prices=legacy.prices.p;

  const fresh=loadJson(LEGACY_NEW_KEY,null);
  if(fresh){

    next.fresh.pending=String(fresh.input||'');
    next.fresh.pair=fresh.pairCount||null;
    next.fresh.columns=Array.isArray(fresh.columnCounts)?fresh.columnCounts:[];
    next.fresh.prices={2:fresh.p2||'',3:fresh.p3||'',4:fresh.p4||''};

}
function mergeState(saved){
  const out=clone(defaults);

  out.old={...defaults.old,...saved.old,pair:{...defaults.old.pair,...saved.old?.pair},pillar:{...defaults.old.pillar,...saved.old?.pillar},car:{...defaults.old.car,...saved.old?.car}};
  out.fresh={...defaults.fresh,...saved.fresh,prices:{...defaults.fresh.prices,...saved.fresh?.prices}};
  if(!out.old.car.doublePrice&&saved.old?.car?.packPrice)out.old.car.doublePrice=saved.old.car.packPrice;
  if(!out.fresh.doublePrice&&saved.fresh?.packPrice)out.fresh.doublePrice=saved.fresh.packPrice;
  out.shortcutVersion=2;
  out.shortcuts=clone(DEFAULT_SHORTCUTS);
  if(saved.shortcutVersion>=1&&saved.shortcuts&&typeof saved.shortcuts==='object'){
    Object.keys(DEFAULT_SHORTCUTS).forEach(action=>{
      if(Array.isArray(saved.shortcuts[action]))out.shortcuts[action]=saved.shortcuts[action].filter(x=>typeof x==='string');

  out.list=Array.isArray(saved.list)?saved.list.map(safeItem):[];

function panelRect(el,left=el.offsetLeft,top=el.offsetTop,width=el.offsetWidth,height=el.offsetHeight){
  return{left,top,right:left+width,bottom:top+height,width,height};
}
function overlaps(a,b,gap=10){
  return a.left<b.right+gap&&a.right+gap>b.left&&a.top<b.bottom+gap&&a.bottom+gap>b.top;
}
function siblingRects(el){
  return [...el.parentElement.querySelectorAll('.panel')].filter(x=>x!==el).map(panelRect);
}
function resolveDrag(el,left,top){
  const parent=el.parentElement,width=el.offsetWidth,height=el.offsetHeight;
  left=Math.max(0,Math.min(left,parent.clientWidth-width));top=Math.max(0,top);
  const others=siblingRects(el);
  for(const other of others){
    let candidate=panelRect(el,left,top,width,height);
    if(!overlaps(candidate,other))continue;
    const options=[
      {left:other.left-width-10,top},
      {left:other.right+10,top},
      {left,top:other.top-height-10},
      {left,top:other.bottom+10}
    ].filter(p=>p.left>=0&&p.left+width<=parent.clientWidth&&p.top>=0);
    if(options.length){
      const best=options.sort((a,b)=>Math.hypot(a.left-left,a.top-top)-Math.hypot(b.left-left,b.top-top))[0];
      left=best.left;top=best.top;
    }else top=other.bottom+10;
  }
  return{left,top};
}
function resolveResize(el,width,height){
  const left=el.offsetLeft,top=el.offsetTop,parent=el.parentElement;
  width=Math.max(280,Math.min(width,parent.clientWidth-left));height=Math.max(140,height);
  siblingRects(el).forEach(other=>{
    if(!overlaps(panelRect(el,left,top,width,height),other))return;
    if(other.left>=left+280)width=Math.min(width,other.left-left-10);
    if(other.top>=top+140)height=Math.min(height,other.top-top-10);
  });
  return{width:Math.max(280,width),height:Math.max(140,height)};
}
function arrangeWorkspace(workspace){
  if(!workspace)return;
  const panels=[...workspace.querySelectorAll('.panel')];
  panels.forEach((el,index)=>{
    for(let i=0;i<index;i++){
      const other=panels[i];
      if(overlaps(panelRect(el),panelRect(other))){
        el.style.top=other.offsetTop+other.offsetHeight+10+'px';
      }
    }
    layout[el.id]={...(layout[el.id]||{}),left:el.style.left,top:el.style.top,width:el.style.width,height:el.classList.contains('collapsed')?'':el.style.height};
  });
  workspace.style.minHeight=Math.max(1050,...panels.map(x=>x.offsetTop+x.offsetHeight+40))+'px';
  saveLayout();
}
function arrangeAllWorkspaces(){requestAnimationFrame(()=>document.querySelectorAll('.workspace').forEach(arrangeWorkspace))}
function ensurePanelFits(panelEl){
  if(!panelEl||panelEl.classList.contains('collapsed'))return;
  requestAnimationFrame(()=>{
    const body=panelEl.querySelector('.panel-body');
    const required=36+body.scrollHeight;
    if(panelEl.offsetHeight<required){
      panelEl.style.height=required+'px';
      layout[panelEl.id]={...(layout[panelEl.id]||{}),height:panelEl.style.height};
      arrangeWorkspace(panelEl.parentElement);
    }
  });
}

function panel(id,title,body,{left=10,top=10,width=520,resizable=true,autoHeight=false}={}){
  const saved=layout[id]||{};
  const el=document.createElement('div');
  el.className='panel'+(saved.collapsed?' collapsed':'');
  el.id=id;
  const maxWidth=Math.max(280,window.innerWidth-20);
  const requestedWidth=parseFloat(saved.width)||width;
  const actualWidth=window.innerWidth<=900?Math.min(requestedWidth,maxWidth):requestedWidth;
  const requestedLeft=parseFloat(saved.left);
  const actualLeft=window.innerWidth<=900?Math.max(0,Math.min(Number.isFinite(requestedLeft)?requestedLeft:left,window.innerWidth-actualWidth-10)):(Number.isFinite(requestedLeft)?requestedLeft:left);
  el.style.left=actualLeft+'px';
  el.style.top=saved.top||top+'px';
  el.style.width=actualWidth+'px';
  if(saved.height&&!autoHeight)el.style.height=saved.height;
  el.innerHTML=`<div class="panel-head"><span class="panel-title">${title}</span><button class="collapse">${saved.collapsed?'⊕':'⊖'}</button></div><div class="panel-body"></div>${resizable?'<div class="resize">◢</div>':''}`;
  el.querySelector('.panel-body').appendChild(body);
  bindPanel(el,{resizable,autoHeight});
  return el;
}
function bindPanel(el,{resizable,autoHeight}){
  const id=el.id,head=el.querySelector('.panel-head'),collapse=el.querySelector('.collapse');
  let action='',sx=0,sy=0,start={};
  const begin=(e,type)=>{
    action=type;sx=e.clientX;sy=e.clientY;
    const parent=el.parentElement.getBoundingClientRect(),rect=el.getBoundingClientRect();
    start={left:rect.left-parent.left,top:rect.top-parent.top,width:rect.width,height:rect.height};
    e.currentTarget.setPointerCapture?.(e.pointerId);e.preventDefault();
  };
  const move=e=>{
    if(!action)return;
    if(action==='drag'){
      const next=resolveDrag(el,start.left+e.clientX-sx,start.top+e.clientY-sy);
      el.style.left=next.left+'px';el.style.top=next.top+'px';
    }else{
      const next=resolveResize(el,start.width+e.clientX-sx,start.height+e.clientY-sy);
      el.style.width=next.width+'px';el.style.height=next.height+'px';
    }
  };
  const end=()=>{
    if(!action)return;action='';
    layout[id]={...(layout[id]||{}),left:el.style.left,top:el.style.top,width:el.style.width,height:autoHeight?'':el.style.height,collapsed:el.classList.contains('collapsed')};
    arrangeWorkspace(el.parentElement);
  };
  head.addEventListener('pointerdown',e=>{if(e.target===collapse)return;begin(e,'drag')});
  head.addEventListener('pointermove',move);head.addEventListener('pointerup',end);head.addEventListener('pointercancel',end);
  if(resizable){
    const resize=el.querySelector('.resize');
    resize.addEventListener('pointerdown',e=>begin(e,'resize'));
    resize.addEventListener('pointermove',move);resize.addEventListener('pointerup',end);resize.addEventListener('pointercancel',end);
  }
  collapse.addEventListener('click',()=>{
    el.classList.toggle('collapsed');collapse.textContent=el.classList.contains('collapsed')?'⊕':'⊖';
    layout[id]={...(layout[id]||{}),collapsed:el.classList.contains('collapsed')};saveLayout();arrangeWorkspace(el.parentElement);
  });
}

function directControl(label,value,min,max,onCommit){
  const wrap=document.createElement('div');wrap.className='control';
  wrap.innerHTML=`<button>−</button><span>${label}</span><input class="direct" inputmode="numeric" maxlength="2" value="${value}"><button>＋</button>`;
  const [minus,plus]=wrap.querySelectorAll('button'),input=wrap.querySelector('input');
  const commit=()=>{input.value=String(clamp(input.value,min,max,value));onCommit(+input.value)};
  minus.onclick=()=>{input.value=String(clamp(+input.value-1,min,max,value));commit()};
  plus.onclick=()=>{input.value=String(clamp(+input.value+1,min,max,value));commit()};
  input.oninput=()=>{input.value=input.value.replace(/\D/g,'').slice(0,2)};
  input.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();commit();input.blur()}};
  input.onchange=commit;input.onclick=()=>input.select();input.onfocus=()=>setTimeout(()=>input.select(),0);
  return wrap;
}
function priceEditor(prices,stars,prefix,disableZero=false){
  const box=document.createElement('div');
  Object.keys(stars).map(Number).forEach(r=>{
    const disabled=disableZero&&!(stars[r]>0);
    if(disabled)prices[r]='';
    const row=document.createElement('div');row.className='price-row';
    if(disabled)row.classList.add('disabled');
    row.innerHTML=`<label style="color:${COLORS[r]}">${NAMES[r]}</label><input id="${prefix}-${r}" class="price" inputmode="decimal" value="${prices[r]||''}" placeholder="${disabled?'無法成立':'輸入價格'}" ${disabled?'disabled':''}>`;
    const input=row.querySelector('input');
    const update=()=>{input.value=cleanNumber(input.value);prices[r]=input.value;save();renderCalculated()};
    input.oninput=update;
    input.onkeydown=e=>{
      if(!(e.code==='NumpadDecimal'||e.key==='Decimal'||e.key==='.'||e.key===','))return;
      e.preventDefault();
      const start=input.selectionStart??input.value.length,end=input.selectionEnd??start;
      input.value=cleanNumber(input.value.slice(0,start)+'.'+input.value.slice(end));
      const caret=Math.min(start+1,input.value.length);
      input.setSelectionRange(caret,caret);
      update();
    };
    input.onfocus=()=>{setFocus(input.id);setTimeout(()=>input.select(),0)};
    box.appendChild(row);
  });
  return box;
}

function submit(kind){
  let item;
  if(kind==='old-pair'){
    const p=state.old.pair,stars=starsForPair(p.count,p.maxStar);
    if(!Object.keys(stars).length)return alert('請先輸入有效連碰組數');
    item={type:'lp',desc:`連碰 ${p.count}個`,stars,starPrices:{...p.prices}};
    p.count=0;p.buffer='';p.prices={};state.old.focus='qty';
  }else if(kind==='old-pillar'){
    const p=state.old.pillar,stars=starsForPillar(p.values,p.maxStar);
    if(p.values.filter(v=>v>0).length<2)return alert('至少需要2柱非零');
    item={type:'pi',desc:`立柱 ${p.values.join('×')}`,stars,starPrices:{...p.prices}};
    p.values=Array(p.columns).fill(0);p.active=0;p.buffer='';p.prices={};state.old.focus='qty';
  }else if(kind==='old-car'){
    const p=state.old.car,doubleBets=doublesFor(p.doubleCount);
    item={type:'car',desc:`車固定38注／化雙選${p.doubleCount||0}個號碼`,stars:{car:38,...(doubleBets?{double:doubleBets}:{})},starPrices:{car:p.price,...(doubleBets?{double:p.doublePrice}:{})}};
    p.doubleCount=0;p.buffer='';p.price='';p.doublePrice='';state.old.focus='qty';
  }else{
    commitFreshPending();
    if(state.fresh.mode==='pair'&&!state.fresh.pair)return alert('請先輸入連碰組數');
    if(state.fresh.mode==='pillar'&&state.fresh.columns.length<2)return alert('至少需要2柱非零');
    if(state.fresh.mode==='car'){
      const doubleBets=doublesFor(state.fresh.doubleCount);
      item={type:'car',desc:`車固定38注／化雙選${state.fresh.doubleCount||0}個號碼`,stars:{car:38,...(doubleBets?{double:doubleBets}:{})},starPrices:{car:state.fresh.carPrice,...(doubleBets?{double:state.fresh.doublePrice}:{})}};
    }else{
      const stars=freshStars();
      item={type:state.fresh.mode==='pair'?'lp':'pi',desc:state.fresh.mode==='pair'?`連碰 ${state.fresh.pair}個`:`立柱 ${state.fresh.columns.join('×')}`,stars,starPrices:{...state.fresh.prices}};
    }
    state.fresh.pending='';state.fresh.pair=null;state.fresh.columns=[];state.fresh.doubleCount=null;state.fresh.prices={};state.fresh.carPrice='';state.fresh.doublePrice='';state.fresh.focus='qty';
  }
  item.id=state.nextId++;state.list.push(item);save();render();focusCurrentQuantity();showStatus(`已加入清單，目前 ${state.list.length} 筆`);

  else if(kind==='old-pillar'){Object.assign(state.old.pillar,{values:Array(state.old.pillar.columns).fill(0),active:0,buffer:'',prices:{}})}
  else if(kind==='old-car'){Object.assign(state.old.car,{doubleCount:0,buffer:'',price:'',doublePrice:''})}
  else{Object.assign(state.fresh,{pending:'',pair:null,columns:[],doubleCount:null,prices:{},carPrice:'',doublePrice:'',focus:'qty'})}

function commitFreshPending(){
  const n=+state.fresh.pending;if(!n)return false;
  if(state.fresh.mode==='pair')state.fresh.pair=n;

function calcFormat(value){
  if(!Number.isFinite(value))return'錯誤';
  const rounded=Math.round((value+Number.EPSILON)*1e10)/1e10;
  return String(rounded).length>16?rounded.toExponential(8):String(rounded);
}
function calcApply(a,b,operator){
  if(operator==='+')return a+b;
  if(operator==='-')return a-b;
  if(operator==='*')return a*b;
  if(operator==='/')return b===0?NaN:a/b;
  return b;
}
function renderCalculator(){
  const display=document.getElementById('calcDisplay'),expression=document.getElementById('calcExpression');
  display.textContent=calculator.display;
  expression.textContent=calculator.expression||' ';
  const length=calculator.display.length;
  const base=length>18?20:length>14?25:length>10?31:38;
  display.style.fontSize=base*state.fontScale+'px';
  requestAnimationFrame(()=>{
    display.scrollLeft=display.scrollWidth;
    expression.scrollLeft=expression.scrollWidth;
  });
}
function calcClear(){
  calculator={display:'0',stored:null,operator:null,waiting:false,expression:''};
  renderCalculator();
}
function calcDigit(digit){
  if(calculator.display==='錯誤')calcClear();
  if(calculator.waiting){calculator.display=digit;calculator.waiting=false}
  else calculator.display=calculator.display==='0'?digit:(calculator.display+digit).slice(0,16);
  renderCalculator();
}
function calcDecimal(){
  if(calculator.display==='錯誤')calcClear();
  if(calculator.waiting){calculator.display='0.';calculator.waiting=false}
  else if(!calculator.display.includes('.'))calculator.display+='.';
  renderCalculator();
}
function calcOperator(operator){
  const current=parseFloat(calculator.display);
  if(!Number.isFinite(current))return calcClear();
  if(calculator.operator&&!calculator.waiting){
    const result=calcApply(calculator.stored,current,calculator.operator);
    calculator.display=calcFormat(result);
    calculator.stored=result;
  }else calculator.stored=current;
  if(calculator.display==='錯誤')return renderCalculator();
  calculator.operator=operator;calculator.waiting=true;
  calculator.expression=calculator.display+' '+({'+':'＋','-':'−','*':'×','/':'÷'}[operator]);
  renderCalculator();
}
function calcEquals(){
  if(!calculator.operator)return;
  const current=parseFloat(calculator.display),previous=calculator.stored,operator=calculator.operator;
  const result=calcApply(previous,current,operator);
  calculator.expression=`${calcFormat(previous)} ${{'+':'＋','-':'−','*':'×','/':'÷'}[operator]} ${calcFormat(current)} ＝`;
  calculator.display=calcFormat(result);calculator.stored=null;calculator.operator=null;calculator.waiting=true;
  renderCalculator();
}
function calcAction(action,value){
  if(action==='digit')calcDigit(value);
  else if(action==='decimal')calcDecimal();
  else if(action==='operator')calcOperator(value);
  else if(action==='equals')calcEquals();
  else if(action==='clear')calcClear();
  else if(action==='backspace'){
    if(calculator.waiting||calculator.display==='錯誤')return;
    calculator.display=calculator.display.length>1?calculator.display.slice(0,-1):'0';renderCalculator();
  }else if(action==='sign'){
    if(calculator.display!=='0'&&calculator.display!=='錯誤')calculator.display=calculator.display.startsWith('-')?calculator.display.slice(1):'-'+calculator.display;
    renderCalculator();
  }else if(action==='percent'){
    if(calculator.display!=='錯誤')calculator.display=calcFormat(parseFloat(calculator.display)/100);
    renderCalculator();
  }
}
function handleCalculatorKey(e){
  const code=e.code,key=e.key;
  if(/^\d$/.test(key)){calcDigit(key);return true}
  if(code?.startsWith('Numpad')&&/^Numpad\d$/.test(code)){calcDigit(code.slice(-1));return true}
  if(key==='.'||key===','||code==='NumpadDecimal'){calcDecimal();return true}
  if(key==='+'||code==='NumpadAdd'){calcOperator('+');return true}
  if(key==='-'||code==='NumpadSubtract'){calcOperator('-');return true}
  if(key==='*'||code==='NumpadMultiply'){calcOperator('*');return true}
  if(key==='/'||code==='NumpadDivide'){calcOperator('/');return true}
  if(key==='Enter'||key==='='||code==='NumpadEnter'){calcEquals();return true}
  if(key==='Backspace'){calcAction('backspace');return true}
  if(key==='Escape'||key==='Delete'){calcClear();return true}
  if(key==='%'){calcAction('percent');return true}
  return false;
}

function keySignature(e){
  const parts=[];
  if(e.ctrlKey)parts.push('Ctrl');
  if(e.altKey)parts.push('Alt');
  if(e.shiftKey)parts.push('Shift');
  if(e.metaKey)parts.push('Meta');
  parts.push(e.code||e.key);
  return parts.join('+');
}
function shortcutAction(e){
  const signature=keySignature(e);
  return Object.keys(state.shortcuts).find(action=>state.shortcuts[action].includes(signature))||null;
}
function keyName(signature){
  if(signature==='Shift+Digit8')return '主鍵盤 *';
  const names={
    Ctrl:'Ctrl',Alt:'Alt',Shift:'Shift',Meta:'Windows',
    NumLock:'Num Lock',NumpadDivide:'數字鍵盤 ÷',NumpadMultiply:'數字鍵盤 *',NumpadAdd:'數字鍵盤 +',
    NumpadEnter:'數字鍵盤 Enter',Enter:'Enter',Tab:'Tab',Backspace:'Backspace',
    Escape:'Esc',Slash:'/',Equal:'=',Space:'空白鍵'
  };
  return signature.split('+').map(part=>{
    if(names[part])return names[part];
    if(/^Digit\d$/.test(part))return '主鍵盤 '+part.slice(-1);
    if(/^Numpad\d$/.test(part))return '數字鍵盤 '+part.slice(-1);
    if(/^Key[A-Z]$/.test(part))return part.slice(-1);
    return part;
  }).join(' + ');
}

function closeKeyCapture(){
  keyCapture=null;
  document.getElementById('keyCapture').classList.remove('open');
}
function captureKey(e){
  e.preventDefault();
  e.stopPropagation();
  if(['Shift','Control','Alt','Meta'].includes(e.key))return;
  const signature=keySignature(e);
  const conflict=Object.entries(state.shortcuts).find(([action,keys])=>
    keys.some((key,index)=>key===signature&&!(action===keyCapture.action&&index===keyCapture.index))
  );
  if(conflict){
    alert('此按鍵已設定為「'+SHORTCUT_LABELS[conflict[0]]+'」，請先移除或改用其他按鍵。');
    return;
  }
  const keys=state.shortcuts[keyCapture.action];
  if(keyCapture.index===null)keys.push(signature);
  else keys[keyCapture.index]=signature;
  save();
  closeKeyCapture();
  renderKeySettings();
  showStatus('快捷鍵已保存');
}

function switchPage(page){
  state.page=page;
  document.querySelectorAll('.page').forEach(x=>x.classList.toggle('active',x.id==='page-'+page));
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.page===page));
  save();render();
}
function render(){
  if(state.page==='old')renderOld();
  if(state.page==='new')renderNew();
  renderList();
  renderKeySettings();
  arrangeAllWorkspaces();
}
function fitTotals(){requestAnimationFrame(()=>document.querySelectorAll('#oldTotal,#newTotal').forEach(el=>{if(!el.classList.contains('collapsed'))el.style.height='auto'}))}

function inputDigit(d){
  if(state.page==='old'){
    if(state.old.focus!=='qty')return false;
    if(state.old.mode==='pair'){
      const p=state.old.pair;p.buffer=(p.buffer+d).slice(-2);p.count=clamp(p.buffer,0,39,0);
    }else if(state.old.mode==='car'){
      const p=state.old.car;p.buffer=(p.buffer+d).slice(-2);p.doubleCount=clamp(p.buffer,0,39,0);
    }else{
      const p=state.old[state.old.mode];p.buffer=(p.buffer+d).slice(-2);p.values[p.active]=clamp(p.buffer,0,p.maxValue,0);
    }
    save();refreshOldInput();
    if(state.old.mode==='pillar'&&state.old.pillar.autoAdvance){
      const p=state.old.pillar;
      const requiredDigits=p.maxValue<=9?1:2;
      if(p.buffer.length>=requiredDigits)advanceOldColumns();
      else focusCurrentQuantity();
    }
    return true;
  }
  if(state.page==='new'&&state.fresh.focus==='qty'){
    state.fresh.pending=(state.fresh.pending+d).slice(-2);save();refreshNewInput();return true;
  }
  return false;
}
function advanceOldColumns(){
  const mode=state.old.mode,p=state.old[mode];p.buffer='';
  if(p.active<p.columns-1){
    p.active++;save();refreshOldInput();
    document.querySelector('#oldInput .pillar.active')?.focus();
    return;
  }
  const priceId='old-pillar-price-'+Object.keys(starsForPillar(p.values,p.maxStar))[0];
  if(priceId&&!priceId.endsWith('undefined')){
    state.old.focus=priceId;save();refreshOldInput();
    document.getElementById(state.old.focus)?.focus();
  }
}
function enterAction(){
  if(state.page==='old'){
    if(state.old.focus==='qty'){
      if(state.old.mode==='pillar'){
        advanceOldColumns();return;
      }
      if(state.old.mode==='car'){
        state.old.car.buffer='';state.old.focus='old-car-price';save();refreshOldInput();document.getElementById(state.old.focus)?.focus();return;
      }
      const first=Object.keys(starsForPair(state.old.pair.count,state.old.pair.maxStar))[0];
      if(first){
        state.old.pair.buffer='';
        state.old.focus='old-pair-price-'+first;
        save();refreshOldInput();document.getElementById(state.old.focus)?.focus();
      }
    }else cyclePriceFocus('old');
    return;
  }
  if(state.page==='new'){
    if(state.fresh.focus==='qty'){
      if(state.fresh.mode==='pillar'||state.fresh.mode==='car'){
        if(commitFreshPending()&&state.fresh.mode==='pillar'){save();refreshNewInput();return}
        const priceId=state.fresh.mode==='car'?'fresh-car-price':('fresh-price-'+Object.keys(freshStars())[0]);
        if(priceId&&!priceId.endsWith('undefined')){state.fresh.focus=priceId;refreshNewInput();document.getElementById(state.fresh.focus)?.focus()}
        return;
      }
      if(commitFreshPending()){save();refreshNewInput()}
      const first=Object.keys(freshStars())[0];
      if(first){state.fresh.focus='fresh-price-'+first;refreshNewInput();document.getElementById(state.fresh.focus)?.focus()}
    }else cyclePriceFocus('new');
  }
}
function cyclePriceFocus(scope){
  const isCar=scope==='new'?state.fresh.mode==='car':state.old.mode==='car';
  if(isCar){
    const current=scope==='new'?state.fresh.focus:state.old.focus;
    const carId=scope==='new'?'fresh-car-price':'old-car-price';
    const doubleId=scope==='new'?'fresh-double-price':'old-double-price';
    if(current===carId){
      if(scope==='new')state.fresh.focus=doubleId;else state.old.focus=doubleId;
      save();document.getElementById(doubleId)?.focus();return;
    }
    if(scope==='new'){state.fresh.focus='qty';save();refreshNewInput();document.getElementById('freshDisplay')?.focus()}
    else{state.old.focus='qty';save();refreshOldInput();document.querySelector('#oldInput .number-display')?.focus()}
    return;
  }
  const prefix=scope==='new'?'fresh-price-':state.old.mode==='pair'?'old-pair-price-':'old-pillar-price-';
  const current=scope==='new'?state.fresh.focus:state.old.focus;
  const stars=scope==='new'
    ? Object.keys(freshStars()).map(Number)
    : Object.keys(state.old.mode==='pair'?starsForPair(state.old.pair.count,state.old.pair.maxStar):starsForPillar(state.old.pillar.values,state.old.pillar.maxStar)).map(Number);
  const currentStar=+current.split('-').pop(),index=stars.indexOf(currentStar);
  if(index>=0&&index<stars.length-1){
    const id=prefix+stars[index+1];if(scope==='new')state.fresh.focus=id;else state.old.focus=id;document.getElementById(id)?.focus();
  }else{
    if(scope==='new'){
      state.fresh.focus='qty';save();refreshNewInput();
      document.getElementById('freshDisplay')?.focus();
    }else{
      state.old.focus='qty';
      if(state.old.mode==='pillar')state.old.pillar.active=0;
      save();refreshOldInput();
      if(state.old.mode==='pillar')document.querySelector('#oldInput .pillar.active')?.focus();
      else document.querySelector('#oldInput .number-display')?.focus();
    }
  }
}

document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>switchPage(tab.dataset.page));
document.getElementById('clearAll').onclick=clearAll;
document.getElementById('fontDown').onclick=()=>changeFontScale(-.1);
document.getElementById('fontUp').onclick=()=>changeFontScale(.1);
document.getElementById('fontReset').onclick=()=>{state.fontScale=1;applyFontScale();save();render();showStatus('字體已恢復 100%')};
document.getElementById('themeToggle').onclick=toggleTheme;
document.getElementById('calcKeys').addEventListener('click',e=>{
  const button=e.target.closest('button[data-calc]');
  if(button)calcAction(button.dataset.calc,button.dataset.value);
});
document.getElementById('cancelKeyCapture').onclick=closeKeyCapture;
document.getElementById('resetKeys').onclick=()=>{
  if(!confirm('確定恢復所有預設快捷鍵？'))return;
  state.shortcuts=clone(DEFAULT_SHORTCUTS);save();renderKeySettings();showStatus('已恢復預設鍵位');
};
document.getElementById('keySettings').addEventListener('click',e=>{
  const button=e.target.closest('button[data-action]');
  if(!button)return;
  const action=button.dataset.action;
  if(e.target.dataset.remove){
    state.shortcuts[action].splice(Number(button.dataset.index),1);
    save();renderKeySettings();showStatus('鍵位已移除');return;
  }
  openKeyCapture(action,button.dataset.add?null:Number(button.dataset.index));
});
document.addEventListener('focusin',e=>{
  if(e.target.matches('input')&&e.target.value)setTimeout(()=>e.target.select(),0);
});
document.addEventListener('keydown',e=>{
  if(keyCapture){captureKey(e);return}
  if(state.page==='calc'&&handleCalculatorKey(e)){e.preventDefault();return}
  const action=shortcutAction(e);
  if(action==='clearAll'){if(state.list.length&&confirm('確定清除全部清單？')){state.list=[];save();render()}return}
  if(action==='submit'&&!e.target.classList.contains('direct')){
    e.preventDefault();submit(state.page==='new'?'new':state.old.mode==='pair'?'old-pair':state.old.mode==='car'?'old-car':'old-pillar');return;
  }
  if(e.target.matches('input')){
    if(action==='next'&&e.target.classList.contains('price')){
      e.preventDefault();cyclePriceFocus(state.page==='new'?'new':'old');
    }
    return;
  }
  if(action==='backspace'){
    e.preventDefault();
    if(state.page==='new')backspaceFresh();
    else if(state.page==='old')backspaceOld();
    return;
  }
  if(action==='modePair'){e.preventDefault();if(state.page==='old'){state.old.mode='pair';state.old.focus='qty';renderOld()}else if(state.page==='new')resetFreshMode('pair');return}
  if(action==='modePillar'){
    e.preventDefault();
    if(state.page==='old'){
      state.old.mode='pillar';state.old.focus='qty';
      state.old.pillar.active=0;state.old.pillar.buffer='';
      save();renderOld();focusCurrentQuantity();
    }else if(state.page==='new')resetFreshMode('pillar');
    return;
  }
  if(action==='modeCar'){
    e.preventDefault();
    if(state.page==='old'){
      state.old.mode='car';state.old.focus='qty';
      state.old.car.buffer='';
      save();renderOld();focusCurrentQuantity();
    }else if(state.page==='new')resetFreshMode('car');
    return;
  }
  if(action?.startsWith('digit')&&inputDigit(action.slice(-1))){e.preventDefault();return}
  if(action==='next'){e.preventDefault();enterAction();return}
});

window.addEventListener('resize',()=>{fitTotals();arrangeAllWorkspaces()});
state.page=['old','new','list','keys','calc'].includes(state.page)?state.page:'old';
applyFontScale();
applyTheme();
renderCalculator();
switchPage(state.page);
})();
</script>
</body>
</html>
