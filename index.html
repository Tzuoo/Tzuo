<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirect</title>
</head>
<body>

<script>
if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
    window.location.href = "mobile.html";
} else {
    window.location.href = "desktop.html";
}
</script>

</body>
</html>
