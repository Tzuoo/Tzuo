<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>539 жҹҘиЎЁе·Ҙе…· v2 - NUMйҖЈзў° /ж–ңз·ҡз«Ӣжҹұ зңҹжӯЈдҝ®жӯЈзүҲ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--bd:#2e3450;--ac:#4f7cff;--ac2:#7c5fff;--tx:#e8eaf6;--mu:#7880a0;--c2:#60a5fa;--c3:#34d399;--c4:#fbbf24;--c5:#f87171;--c6:#c084fc}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* header */
header{background:#0f1117;border-bottom:1px solid var(--bd);padding:12px 14px 0;position:sticky;top:0;z-index:200}
h1{font-size:16px;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:9px}
.ptabs{display:flex;gap:6px;justify-content:center}
.ptab{padding:6px 16px;border-radius:7px 7px 0 0;font-size:12px;font-weight:500;color:var(--mu);cursor:pointer;border:1px solid transparent;border-bottom:none;background:transparent;transition:all .2s}
.ptab.active{background:var(--sf);color:var(--tx);border-color:var(--bd)}

/* pages */
.page{display:none;padding:10px;padding-bottom:80px}
.page.active{display:block}

/* в”Җв”Җ еҸҜжӢ–жӢүйқўжқҝ в”Җв”Җ */
.panels-container{position:relative;min-height:600px}
.panel{position:absolute;background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;min-width:160px;min-height:100px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.panel-header{padding:7px 10px;background:var(--sf2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;cursor:grab;user-select:none;-webkit-user-select:none}
.panel-header:active{cursor:grabbing}
.panel-title{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--mu);text-transform:uppercase;display:flex;align-items:center;gap:6px}
.panel-controls{display:flex;gap:4px;align-items:center}
.panel-ctrl-btn{width:20px;height:20px;border:none;background:transparent;color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:13px;flex-shrink:0}
.panel-ctrl-btn:active{background:rgba(255,255,255,.1)}
.resize-handle{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:se-resize;display:flex;align-items:flex-end;justify-content:flex-end;padding:3px;color:var(--bd)}
.resize-handle:hover{color:var(--mu)}
.panel-body{padding:10px;overflow-y:auto;height:calc(100% - 34px)}

/* subtabs within panel */
.subtabs{display:flex;gap:4px;margin-bottom:8px}
.stab{flex:1;padding:5px 0;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'Noto Sans TC',sans-serif;font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s}
.stab.active{background:var(--sf2);color:var(--tx);border-color:var(--ac)}

/* ctrl row with editable number */
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.cg{display:flex;align-items:center;background:var(--sf2);border:1px solid var(--bd);border-radius:18px;overflow:hidden}
.cl{font-size:10px;color:var(--mu);padding:0 6px;white-space:nowrap}
.cb2{width:26px;height:26px;border:none;background:transparent;color:var(--tx);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cb2:active{background:rgba(79,124,255,.2)}
.cv-input{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--ac);width:32px;text-align:center;background:transparent;border:none;outline:none;padding:0;cursor:text}
.cv-input:focus{background:rgba(79,124,255,.1);border-radius:4px}

/* picker */
.num-picker{display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 0}
.picker-display{font-family:'DM Mono',monospace;font-size:48px;font-weight:700;color:var(--tx);line-height:1;text-align:center}
.picker-sub{font-size:11px;color:var(--mu);text-align:center}
.lp-kb-row{display:flex;align-items:center;gap:7px;width:100%;max-width:240px}
.lp-kb-input-box{flex:1;height:42px;border-radius:7px;border:2px solid var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--tx);transition:all .15s}
.lp-kb-input-box.active{border-color:var(--ac);background:rgba(79,124,255,.18);box-shadow:0 0 0 3px rgba(79,124,255,.18),0 0 16px rgba(79,124,255,.25)}
.lp-kb-input-box.active::after{content:'жӯЈеңЁијёе…Ҙ';font-family:'Noto Sans TC',sans-serif;font-size:10px;font-weight:500;color:var(--ac);margin-left:8px}
.picker-btns{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%}
.pnum{height:32px;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);color:var(--mu);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.pnum.sel{background:var(--ac);border-color:var(--ac);color:#fff}
.star-preview{font-size:11px;color:var(--mu);margin-top:8px;line-height:1.9}
.star-preview b{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}

/* star price grid */
.spg{display:flex;flex-direction:column;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:8px}
.sp-row{display:flex;align-items:center;border-bottom:1px solid var(--bd)}
.sp-row:last-child{border-bottom:none}
.sp-lbl{width:46px;padding:0 8px;font-size:11px;font-weight:500;flex-shrink:0;display:flex;align-items:center;gap:5px;height:36px}
.sp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sp-val{flex:1;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--tx);padding:0 10px;height:36px;display:flex;align-items:center;justify-content:flex-end;border-left:1px solid var(--bd);cursor:pointer;transition:background .1s}
.sp-val.active{background:rgba(79,124,255,.1)}
.sp-val.empty{color:var(--mu);font-size:11px}

/* manual input grid */
.manual-grid{display:flex;flex-direction:column;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:8px}
.manual-row{display:flex;align-items:center;border-bottom:1px solid var(--bd)}
.manual-row:last-child{border-bottom:none}
.manual-lbl{width:46px;padding:0 8px;font-size:11px;font-weight:500;flex-shrink:0;display:flex;align-items:center;gap:5px;height:36px}
.manual-val{flex:1;font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--tx);padding:0 10px;height:36px;display:flex;align-items:center;justify-content:flex-end;border-left:1px solid var(--bd);cursor:pointer;transition:background .1s}
.manual-val.active{background:rgba(79,124,255,.1)}
.manual-val.empty{color:var(--mu);font-size:12px}

/* sliders */
.slrows{display:flex;flex-direction:column;gap:8px}
.slrow{display:flex;align-items:center;gap:7px}
.plbl{font-size:11px;color:var(--mu);width:24px;flex-shrink:0;font-family:'DM Mono',monospace}
.slrow input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--bd);outline:none}
.slrow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac);cursor:pointer}
.sv{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;width:18px;text-align:center;flex-shrink:0}
.sv.z{color:var(--mu)}.sv.nz{color:var(--tx)}
.brow{display:flex;align-items:center;gap:4px}
.nbtns{display:flex;gap:3px;flex:1;flex-wrap:wrap}
.nbtn{min-width:20px;height:26px;padding:0 2px;border-radius:5px;border:1px solid var(--bd);background:var(--sf2);color:var(--mu);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;flex:1}
.nbtn.sel{background:var(--ac);border-color:var(--ac);color:#fff}
.nbtn.sel.z0{background:var(--mu);border-color:var(--mu)}
.cdsp{margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);font-size:11px;color:var(--mu)}
.cvl{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--tx)}

/* shared keyboard panel */
.key{height:40px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-family:'DM Mono',monospace;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;appearance:none;transition:background .1s;width:100%}
.key:active{background:var(--ac);border-color:var(--ac);color:#fff}
.key.kred{color:var(--c5)}
.key.kblue{background:var(--ac);border-color:var(--ac);color:#fff}
.kp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.kp-status{font-size:10px;color:var(--mu);margin-bottom:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.kp-badge{padding:2px 7px;border-radius:7px;font-size:10px;font-weight:500}
.kp-badge.lp{background:rgba(79,124,255,.2);color:var(--ac)}
.kp-badge.pi{background:rgba(52,211,153,.2);color:var(--c3)}
.kp-badge.mn{background:rgba(251,191,36,.2);color:var(--c4)}

/* add button */
.add-btn{width:100%;padding:10px;border-radius:8px;border:none;background:var(--ac);color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
.add-btn:active{opacity:.8}
.add-btn.success{background:#059669}

/* mtog */
.mtog{display:flex;gap:4px}
.mbtn{padding:4px 8px;border-radius:9px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'Noto Sans TC',sans-serif;font-size:11px;cursor:pointer;transition:all .15s}
.mbtn.active{background:var(--sf2);color:var(--tx);border-color:var(--ac)}

/* list page */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:10px}
.ch{padding:8px 12px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:10px;letter-spacing:1px;color:var(--mu);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.list-empty{padding:16px;text-align:center;color:var(--mu);font-size:12px}
.list-item{padding:9px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:8px}
.list-item:last-child{border-bottom:none}
.li-left{flex:1;min-width:0}
.li-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:7px;font-weight:500;margin-bottom:2px}
.li-tag.lp{background:rgba(79,124,255,.18);color:var(--ac)}
.li-tag.pi{background:rgba(52,211,153,.18);color:var(--c3)}
.li-tag.mn{background:rgba(251,191,36,.18);color:var(--c4)}
.li-desc{font-family:'DM Mono',monospace;font-size:12px;color:var(--tx);margin-bottom:2px}
.li-stars{font-size:11px;color:var(--mu);line-height:1.8}
.li-stars b{font-family:'DM Mono',monospace;font-weight:500}
.li-del{width:26px;height:26px;border:none;background:transparent;color:var(--mu);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.li-del:active{color:var(--c5)}
.clr-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'Noto Sans TC',sans-serif;font-size:11px;cursor:pointer}
.total-section{padding:10px 12px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)}
.total-row:last-child{border-bottom:none;padding-top:8px}
.total-label{font-size:12px;display:flex;align-items:center;gap:7px}
.total-dot{width:7px;height:7px;border-radius:50%}
.total-notes{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace}
.total-amt{font-family:'DM Mono',monospace;font-size:16px;font-weight:500}
.grand-label{font-size:13px;font-weight:700;color:var(--tx)}
.grand-amt{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--c4)}

/* mobile separated-page layout - дҝқз•ҷжӢ–жӢүиҲҮзё®ж”ҫ */
@media (max-width: 900px){
  header{padding-bottom:0}
  .ptabs{gap:4px}
  .ptab{flex:1;text-align:center;padding:7px 4px;font-size:12px}
  .page{padding:8px 8px 90px}
  /* дёҚеҶҚжҠҠйқўжқҝж”№жҲҗзӣҙеҗ‘еҚЎзүҮпјҢдҝқз•ҷ absolute жүҚиғҪдёҠдёӢе·ҰеҸіжӢ–жӢү */
  .panels-container{position:relative;display:block;min-height:1060px;overflow:visible}
  .panel{position:absolute;min-width:220px;min-height:120px;overflow:hidden}
  .panel-body{height:calc(100% - 34px);overflow-y:auto}
  .panel-controls{display:flex!important}
  .resize-handle{display:flex!important;width:26px;height:26px;padding:4px;font-size:15px;z-index:5}
  .panel-header{cursor:grab;touch-action:none}
  .picker-display{font-size:42px}
  .kp-grid{gap:6px}
  .key{height:44px}
}
</style>

<body>
<header>
  <h1>539 жҹҘиЎЁе·Ҙе…· v2 <span style="font-size:10px;color:var(--mu);-webkit-text-fill-color:var(--mu);background:none">NUMйҖЈзў° /ж–ңз·ҡз«Ӣжҹұ дҝ®жӯЈзүҲ 20260608</span></h1>
  <div class="ptabs">
    <div class="ptab active" data-page="lp" onclick="setPage('lp')">йҖЈзў°/жүӢеӢ•</div>
    <div class="ptab" data-page="p" onclick="setPage('p')">з«Ӣжҹұ</div>
    <div class="ptab" data-page="list" onclick="setPage('list')">жё…е–®<span id="list-badge" style="display:none;background:var(--ac);color:#fff;font-size:10px;padding:1px 5px;border-radius:6px;margin-left:3px;vertical-align:middle"></span></div>
  </div>
</header>

<!-- в•җв•җ йҖЈзў°/жүӢеӢ•й Ғ в•җв•җ -->
<div class="page active" id="page-lp">
  <div style="font-size:10px;color:var(--mu);text-align:center;padding:4px 0 8px">жүӢж©ҹзүҲпјҡйҖЈзў°/жүӢеӢ•гҖҒз«ӢжҹұеҲҶй ҒйЎҜзӨә В· зёҪиЁҲиҲҮйҚөзӣӨеҗ„й Ғе…ұз”Ё</div>
  <div class="panels-container" id="panels-container-lp"></div>
</div>

<!-- в•җв•җ з«Ӣжҹұй Ғ в•җв•җ -->
<div class="page" id="page-p">
  <div style="font-size:10px;color:var(--mu);text-align:center;padding:4px 0 8px">жүӢж©ҹзүҲпјҡз«Ӣжҹұе–®зҚЁж“ҚдҪң В· зёҪиЁҲиҲҮйҚөзӣӨеҗ„й Ғе…ұз”Ё</div>
  <div class="panels-container" id="panels-container-p"></div>
</div>

<!-- в•җв•җ жё…е–®й Ғ в•җв•җ -->
<div class="page" id="page-list">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:12px;color:var(--mu)" id="list-count">0 зө„</span>
    <button class="clr-btn" onclick="clearList()">жё…йҷӨе…ЁйғЁ</button>
  </div>
  <div class="card">
    <div class="ch">зёҪиЁҲ</div>
    <div class="total-section" id="total-section"><div class="list-empty" style="padding:8px 0">е°ҡз„ЎиіҮж–ҷ</div></div>
  </div>
  <div class="card">
    <div class="ch">жҳҺзҙ°</div>
    <div id="list-items"><div class="list-empty">е°ҡжңӘеҠ е…Ҙд»»дҪ•зө„еҗҲ</div></div>
  </div>
</div>

<script>
const SC={2:'#60a5fa',3:'#34d399',4:'#fbbf24',5:'#f87171',6:'#c084fc',7:'#38bdf8',8:'#a3e635',9:'#fb923c'};
const SL={2:'дәҢжҳҹ',3:'дёүжҳҹ',4:'еӣӣжҳҹ',5:'дә”жҳҹ',6:'е…ӯжҳҹ',7:'дёғжҳҹ',8:'е…«жҳҹ',9:'д№қжҳҹ'};
function C(n,r){if(r<0||r>n)return 0;if(r===0||r===n)return 1;let a=1,b=1;for(let i=0;i<r;i++){a*=(n-i);b*=(i+1)}return Math.round(a/b);}

function cleanDec(s){
  s = String(s ?? '').trim();
  if(!s || s==='.') return '0';
  if(s.startsWith('.')) s='0'+s;
  if(s.endsWith('.')) s=s.slice(0,-1);
  return s || '0';
}
function trimDecStr(s){
  s=String(s);
  if(s.includes('.')) s=s.replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1').replace(/\.$/,'');
  if(s==='-0') s='0';
  return s;
}
function decMulIntStr(dec, mult){
  dec=cleanDec(dec);
  mult=BigInt(mult||0);
  let neg=false;
  if(dec[0]==='-'){neg=true;dec=dec.slice(1);}
  let [intPart, fracPart=''] = dec.split('.');
  intPart=intPart.replace(/^0+(?=\d)/,'') || '0';
  const scale=fracPart.length;
  let digits=(intPart+fracPart).replace(/^0+(?=\d)/,'') || '0';
  let n=BigInt(digits)*mult;
  if(n===0n) return '0';
  let out=n.toString();
  if(scale>0){
    if(out.length<=scale) out='0'.repeat(scale-out.length+1)+out;
    out=out.slice(0,out.length-scale)+'.'+out.slice(out.length-scale);
  }
  out=trimDecStr(out);
  return neg?'-'+out:out;
}
function decAddStr(a,b){
  a=cleanDec(a); b=cleanDec(b);
  const negA=a[0]==='-', negB=b[0]==='-';
  if(negA || negB){ return trimDecStr(String((parseFloat(a)||0)+(parseFloat(b)||0))); }
  const [ai,af='']=a.split('.'), [bi,bf='']=b.split('.');
  const scale=Math.max(af.length,bf.length);
  const A=BigInt((ai+(af+'0'.repeat(scale)).slice(0,scale)).replace(/^0+(?=\d)/,'')||'0');
  const B=BigInt((bi+(bf+'0'.repeat(scale)).slice(0,scale)).replace(/^0+(?=\d)/,'')||'0');
  let out=(A+B).toString();
  if(scale>0){
    if(out.length<=scale) out='0'.repeat(scale-out.length+1)+out;
    out=out.slice(0,out.length-scale)+'.'+out.slice(out.length-scale);
  }
  return trimDecStr(out);
}
function amountStr(cnt, price){
  if(!cnt || !price || cleanDec(price)==='0') return null;
  return decMulIntStr(price, Number(cnt)*100);
}
function amountHundredStr(cnt, price){
  // зёҪиЁҲе°ҸиЎЁжҜҸдёҖзӯҶзҙҖйҢ„йЎҜзӨәгҖҢзҷҫе…ғе–®дҪҚгҖҚпјҡжіЁж•ё Г— зҷҫе…ғеғ№ж јгҖӮ
  // зө•е°ҚдёҚеҒҡ Math.round / toFixedпјҢијёеҮәе®Ңж•ҙе°Ҹж•ёгҖӮ
  // дҫӢпјҡ6жіЁ Г— 2.33зҷҫ = 13.98пјӣ4жіЁ Г— 1.64зҷҫ = 6.56пјӣ1жіЁ Г— 1.7322зҷҫ = 1.7322гҖӮ
  if(!cnt || price===undefined || price===null || cleanDec(price)==='0') return null;
  return decMulIntStr(cleanDec(price), Number(cnt));
}

function __decimalDisplaySelfTest(){
  return {
    twoStar: amountHundredStr(6,'2.33'),
    threeStar: amountHundredStr(4,'1.64'),
    fourStarA: amountHundredStr(1,'1.581'),
    fourStarB: amountHundredStr(1,'1.7322')
  };
}
function combs(n,r){const res=[];function bt(s,c){if(c.length===r){res.push([...c]);return}for(let i=s;i<n;i++){c.push(i);bt(i+1,c);c.pop()}}bt(0,[]);return res;}
function calcStarsParts(parts){const n=parts.length,stars={};for(let r=2;r<=n;r++){let t=0;for(const cb of combs(n,r)){let p=1;for(const i of cb)p*=parts[i];t+=p}stars[r]=t;}return stars;}

function setPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));

function savePanelState(){

    const state = {};

      const el = p.el;
      state[id] = {
        left: parseInt(el.style.left)||0,
        top: parseInt(el.style.top)||0,
        w: parseInt(el.style.width)||p.w,
        h: parseInt(el.style.height)||p.h,
        collapsed: p.collapsed
      };
    }
    localStorage.setItem('539panels', JSON.stringify(state));
  } catch(e){}
}
function loadPanelState(){
  try {

function createPanel(id, title, color, x, y, w, h, renderFn, parentId='panels-container-lp'){
  const el = document.createElement('div');
  el.className = 'panel';
  el.id = 'panel-'+id;
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px`;
  el.innerHTML = `

      <div class="panel-controls">

      </div>

    <div class="resize-handle" id="rh-${id}">в—ў</div>`;
  document.getElementById(parentId).appendChild(el);
  panels[id] = {el, collapsed:false, renderFn, w, h};

function togglePanel(id){
  const p = panels[id];
  p.collapsed = !p.collapsed;
  const body = document.getElementById('pb-'+id);
  const rh = document.getElementById('rh-'+id);
  body.style.display = p.collapsed ? 'none' : '';
  rh.style.display = p.collapsed ? 'none' : '';
  if(p.collapsed){
    p.el.style.height = '34px';
    p.el.style.overflow = 'hidden';
  } else {
    p.el.style.height = p.h+'px';
    p.el.style.overflow = 'hidden';
  }
  savePanelState();
}

function makeDraggable(panel, handle){
  let sx,sy,ox,oy;
  function onStart(cx,cy){
    const r = panel.getBoundingClientRect();
    ox=r.left; oy=r.top; sx=cx; sy=cy;
  }
  function onMove(cx,cy){
    const cont = panel.closest('.panels-container') || document.body;
    const cr = cont.getBoundingClientRect();
    let nx = ox+(cx-sx)-cr.left;
    let ny = oy+(cy-sy)-cr.top;
    nx = Math.max(0, nx);
    ny = Math.max(0, ny);
    panel.style.left = nx+'px';
    panel.style.top = ny+'px';
    savePanelState();
  }
  // mouse
  handle.addEventListener('mousedown', e=>{
    if(e.target.closest('.panel-ctrl-btn')) return;
    onStart(e.clientX,e.clientY);
    const mm=ev=>{onMove(ev.clientX,ev.clientY);};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
    e.preventDefault();
  });
  // touch
  handle.addEventListener('touchstart', e=>{
    if(e.target.closest('.panel-ctrl-btn')) return;
    const t=e.touches[0];
    onStart(t.clientX,t.clientY);
    const tm=ev=>{const t2=ev.touches[0];onMove(t2.clientX,t2.clientY);};
    const tu=()=>{handle.removeEventListener('touchmove',tm);handle.removeEventListener('touchend',tu);};
    handle.addEventListener('touchmove',tm,{passive:false});
    handle.addEventListener('touchend',tu);
    e.preventDefault();
  },{passive:false});
}

function makeResizable(panel, handle, id){
  function onStart(cx,cy){
    const r=panel.getBoundingClientRect();
    const sw=r.width, sh=r.height, sx=cx, sy=cy;
    function onMove(mx,my){
      const nw=Math.max(160,sw+(mx-sx));
      const nh=Math.max(100,sh+(my-sy));
      panel.style.width=nw+'px';
      panel.style.height=nh+'px';
      panels[id].w=nw; panels[id].h=nh;
      savePanelState();
    }
    return onMove;
  }
  handle.addEventListener('mousedown',e=>{
    const mv=onStart(e.clientX,e.clientY);
    const mm=ev=>mv(ev.clientX,ev.clientY);
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
    e.preventDefault();
  });
  handle.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    const mv=onStart(t.clientX,t.clientY);
    const tm=ev=>{const t2=ev.touches[0];mv(t2.clientX,t2.clientY);};
    const tu=()=>{handle.removeEventListener('touchmove',tm);handle.removeEventListener('touchend',tu);};
    handle.addEventListener('touchmove',tm,{passive:false});
    handle.addEventListener('touchend',tu);
    e.preventDefault();
  },{passive:false});
}

function pk(id,k){

  if(id==='lpk'){ pkLpNum(k); return; }
  if(id==='pk'){ pkPillar(k); return; }
  const r=activeStarTarget[id];
  if(r===null)return;
  if(k==='C'){
    const stars=id==='lp'?Object.keys(lpStars).map(Number):Object.keys(pStars).map(Number);
    stars.forEach(sr=>{prices[id][sr]='';const el=document.getElementById(`${id}-sp-${sr}`);if(el){el.textContent='ијёе…Ҙ';el.classList.add('empty');}});
    return;
  }
  let v=prices[id][r]||'';
  if(k==='DEL'){v=v.length>1?v.slice(0,-1):'';}
  else if(k==='.'){if(!v.includes('.'))v+='.';}
  else if(k==='OK'){
    if(id==='lp'){ advanceLpCycle(); return; }
    const stars=Object.keys(pStars).map(Number);
    const idx=stars.indexOf(r);
    if(idx<stars.length-1){selectStar(id,stars[idx+1]);}
    return;
  }
  else{if(v==='0')v=k;else v+=k;}
  if(v.length>8)return;
  prices[id][r]=v;
  const el=document.getElementById(`${id}-sp-${r}`);
  if(el){el.textContent=v||'ијёе…Ҙ';el.classList.toggle('empty',!v);}
}

function advanceLpCycle(){

function pkLpNum(k){
  if(k==='C'){ lpKbInput=''; lpNum=0; renderLpPanel(); return; }
  if(k==='DEL'){ lpKbInput=lpKbInput.slice(0,-1); lpNum=parseInt(lpKbInput)||0; renderLpPanel(); return; }
  if(k==='OK'||k==='.') {
    advanceLpCycle();
    return;
  }
  const n=parseInt(k);
  if(isNaN(n)) return;
  let next=(lpKbInput+k).replace(/^0+(?=\d)/,'');
  if(next.length>2 || (parseInt(next)||0)>39) next=String(n);
  lpKbInput=next;
  lpNum=parseInt(lpKbInput)||0;
  renderLpPanel();
}

function pkManual(k){
  const r=manualActiveR;
  if(k==='C'){

      manualNotes[r2]='';manualPrices2[r2]='';

    });

  }
  if(manualInputField==='notes'){
    let v=manualNotes[r]||'';
    if(k==='DEL'){v=v.length>1?v.slice(0,-1):'';}
    else if(k==='OK'){const s=Array.from({length:manualStarMax-1},(_,i)=>i+2);const i=s.indexOf(r);if(i<s.length-1){manualActiveR=s[i+1];}else{manualActiveR=2;}highlightManualR();return;}
    else if(k==='.'){} // жіЁж•ёдёҚйңҖиҰҒе°Ҹж•ёй»һ
    else{if(v==='0'||v==='')v=k;else v+=k;}

    const el=document.getElementById('mn-'+r);
    if(el){el.textContent=(v||'0')+'жіЁ';el.classList.toggle('empty',!v);}

    else if(k==='.'){if(!v.includes('.'))v+='.';}

    const el=document.getElementById('mn-p-'+r);
    if(el){el.textContent=v||'ијёе…Ҙ';el.classList.toggle('empty',!v);}
  }
}

function adjCols(d){pcols=Math.max(2,Math.min(10,pcols+d));pvals=pvals.slice(0,pcols);while(pvals.length<pcols)pvals.push(1);if(pStarMax>pcols)pStarMax=pcols;renderPPanel();}
function setColsDirect(v){pcols=Math.max(2,Math.min(10,parseInt(v)||pcols));pvals=pvals.slice(0,pcols);while(pvals.length<pcols)pvals.push(1);if(pStarMax>pcols)pStarMax=pcols;renderPPanel();}
function adjMaxNum(d){maxNum=Math.max(1,Math.min(99,maxNum+d));pvals=pvals.map(v=>Math.min(v,maxNum));renderPPanel();}
function setMaxNumDirect(v){maxNum=Math.max(1,Math.min(99,parseInt(v)||maxNum));pvals=pvals.map(v2=>Math.min(v2,maxNum));renderPPanel();}
function adjPStar(d){pStarMax=Math.max(2,Math.min(9,pStarMax+d));renderPPanel();}
function setPStarDirect(v){pStarMax=Math.max(2,Math.min(9,parseInt(v)||pStarMax));renderPPanel();}
function setInputMode(m){inputMode=m;pillarKbIdx=0;renderPPanel();if(m==='kb')setKbFocus('pk');else setKbFocus('p');}

function setPillarKbIdx(i){
  pillarKbIdx=i;
  renderPPanel();
}
function pkPillar(k){
  if(k==='C'){pvals=Array(pcols).fill(0);pillarKbIdx=0;renderPPanel();return;}
  if(k==='DEL'){
    pvals[pillarKbIdx]=Math.floor(pvals[pillarKbIdx]/10);
    renderPPanel();return;
  }
  if(k==='OK'||k==='.'){
    if(pillarKbIdx<pcols-1){
      pillarKbIdx++;
      renderPPanel();
    } else {
      updatePStars();
      renderPPanel();
      // еј·еҲ¶и·іеҲ°з«Ӣжҹұеғ№ж јз¬¬дёҖеҖӢжҳҹ
      setTimeout(()=>{
        setKbFocus('p');
        const stars=Object.keys(pStars).map(Number).sort((a,b)=>a-b);
        if(stars.length) selectStar('p',stars[0]);
      },50);
    }
    return;
  }
  const n=parseInt(k);
  if(isNaN(n))return;
  const cur=pvals[pillarKbIdx]||0;
  const next=parseInt(String(cur===0?'':cur)+String(n));
  if(next<=maxNum){pvals[pillarKbIdx]=next;}
  else{pvals[pillarKbIdx]=n;}
  updatePStars();
  // иҮӘеӢ•и·ідёӢдёҖжҹұпјҲдҪҚж•ёйҒ”еҲ°дёҠйҷҗй•·еәҰпјҢдё” autoJump й–Ӣе•ҹпјү
  if(autoJump && pvals[pillarKbIdx]>0 && String(next).length>=String(maxNum).length){
    if(pillarKbIdx<pcols-1){
      pillarKbIdx++;
    } else {
      setKbFocus('p');
      const stars=Object.keys(pStars).map(Number);
      if(stars.length) selectStar('p',stars[0]);
    }
  }
  renderPPanel();
}

function updatePStars(){
  const eff=pvals.filter(v=>v>0);
  pStars={};
  if(eff.length>=2){const stars=calcStarsParts(eff);const showMax=Math.min(pStarMax,eff.length);for(let r=2;r<=showMax;r++)pStars[r]=stars[r];}
  renderPPanel();
}

let listItems=[],listIdCounter=0;
function addToList(type){
  let stars,desc,tag,starPrices={};
  if(type==='lp'){
    if(!Object.keys(lpStars).length){alert('з„Ўжңүж•Ҳжҳҹж•ё');return;}
    stars={...lpStars};desc=`йҖЈзў° ${lpNum}еҖӢ`;tag='lp';
    Object.keys(stars).map(Number).forEach(r=>{starPrices[r]=cleanDec(prices['lp'][r]||'0');});
    // жё…йҷӨеғ№ж ј
    Object.keys(lpStars).map(Number).forEach(r=>{prices['lp'][r]='';const el=document.getElementById(`lp-sp-${r}`);if(el){el.textContent='ијёе…Ҙ';el.classList.add('empty');}});
  } else if(type==='p'){
    const eff=pvals.filter(v=>v>0);if(eff.length<2){alert('иҮіе°‘йңҖиҰҒ2жҹұйқһйӣ¶');return;}
    if(!Object.keys(pStars).length){alert('з„Ўжңүж•Ҳжҳҹж•ё');return;}
    stars={...pStars};desc=`з«Ӣжҹұ ${pvals.join('Г—')}`;tag='pi';
    Object.keys(stars).map(Number).forEach(r=>{starPrices[r]=cleanDec(prices['p'][r]||'0');});
    // жё…йҷӨеғ№ж ј
    Object.keys(pStars).map(Number).forEach(r=>{prices['p'][r]='';const el=document.getElementById(`p-sp-${r}`);if(el){el.textContent='ијёе…Ҙ';el.classList.add('empty');}});
  } else {
    // жүӢеӢ•
    stars={};
    [2,3,4,5,6,7,8,9].forEach(r=>{const n=parseInt(manualNotes[r]);if(n&&n>0)stars[r]=n;});
    if(!Object.keys(stars).length){alert('и«Ӣијёе…ҘиҮіе°‘дёҖеҖӢжҳҹзҡ„жіЁж•ё');return;}
    desc='жүӢеӢ•иЈңе…Ҙ';tag='mn';
    [2,3,4,5,6,7,8,9].forEach(r=>{starPrices[r]=cleanDec(manualPrices2[r]||'0');});
    // жё…йҷӨжіЁж•ёиҲҮеғ№ж ј
    [2,3,4,5,6,7,8,9].forEach(r=>{
      manualNotes[r]='';manualPrices2[r]='';
      const en=document.getElementById('mn-'+r);if(en){en.textContent='0жіЁ';en.style.color='var(--mu)';}
      const ep=document.getElementById('mn-p-'+r);if(ep){ep.textContent='вҖ”';ep.style.color='var(--mu)';}
    });
  }
  listItems.push({id:listIdCounter++,type:tag,desc,stars,starPrices});

  // еҠ е…Ҙжё…е–®еҫҢпјҢе…Ҳжё…з©әзӣ®еүҚијёе…ҘпјҢеҶҚйҮҚз•«з•«йқўгҖӮ
  // жүӢж©ҹзүҲиҲҮжЎҢж©ҹзүҲйғҪеҝ…й Ҳиө°еҗҢдёҖеҘ—пјҢйҒҝе…ҚжүӢж©ҹеҲҶй Ғ/е…ұз”ЁйҚөзӣӨжІ’жңүеҲ·ж–°гҖӮ
  if(type==='lp'){
    prices['lp']={};
    lpNum=0;
    lpKbInput='';
    lpStars={};
    activeStarTarget['lp']=null;
    setKbFocus('lpk');
    renderLpPanel();
    renderKbPanel();
  }
  else if(type==='p'){
    prices['p']={};
    pvals=Array(pcols).fill(0);
    pStars={};
    pillarKbIdx=0;
    activeStarTarget['p']=null;
    setKbFocus('pk');
    renderPPanel();
    renderKbPanel();
  }
  else if(type==='mn'){
    [2,3,4,5,6,7,8,9].forEach(r=>{manualNotes[r]='';manualPrices2[r]='';});
    renderLpPanel();
    renderKbPanel();
  }

  renderList();
  renderMiniTotal();
  const btnId=type==='lp'?'lp-add-btn':type==='p'?'p-add-btn':'mn-add-btn';
  const btn=document.getElementById(btnId);
  if(btn){const orig=btn.textContent;btn.textContent='вң“ е·ІеҠ е…Ҙ';btn.style.background='#059669';setTimeout(()=>{btn.textContent=orig;btn.style.background='';},1200);}
}

    for(const [r,cnt] of Object.entries(item.stars)){

      }).join('')+
      `<button onclick="delItem(${item.id})" style="width:20px;height:20px;border:none;background:transparent;color:var(--mu);cursor:pointer;font-size:14px;padding:0;flex-shrink:0">Г—</button>`;
    body.appendChild(row);

  // еҗҲиЁҲиЎҢпјҲзҷҫе…ғпјү
  const tot=document.createElement('div');
  tot.style.cssText='display:flex;padding:3px 6px;gap:2px;background:var(--sf2);border-top:1px solid var(--bd);align-items:center';

    stars.map(r=>{
      const amt=totA[r]||null;

    }).join('')+
    '<div style="width:20px"></div>';
  body.appendChild(tot);

  // зёҪйҮ‘йЎҚ
  const g=document.createElement('div');

  g.innerHTML=`<span style="font-size:11px;color:var(--mu)">зёҪйҮ‘йЎҚ</span><span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--c4)">${grand} е…ғ</span>`;

function renderTotal(){
  const sec=document.getElementById('total-section');
  if(!listItems.length){sec.innerHTML='<div class="list-empty" style="padding:8px 0">е°ҡз„ЎиіҮж–ҷ</div>';return;}
  const totN={},totA={};let grand='0';
  for(const item of listItems){
    for(const [r,cnt] of Object.entries(item.stars)){
      const ri=+r;totN[ri]=(totN[ri]||0)+cnt;
      const a=amountStr(cnt,item.starPrices[ri]);
      if(a!==null){totA[ri]=decAddStr(totA[ri]||'0',a);grand=decAddStr(grand,a);}
    }
  }
  const stars=Object.keys(totN).map(Number).sort((a,b)=>a-b);
  let html=stars.map(r=>`<div class="total-row"><div class="total-label"><div class="total-dot" style="background:${SC[r]}"></div><span style="color:${SC[r]}">${SL[r]}</span></div><div style="text-align:right"><div class="total-notes">${totN[r]} жіЁ</div><div class="total-amt" style="color:${SC[r]}">${totA[r]||'0'} е…ғ</div></div></div>`).join('');
  html+=`<div class="total-row"><div class="grand-label">зёҪйҮ‘йЎҚ</div><div class="grand-amt">${grand} е…ғ</div></div>`;
  sec.innerHTML=html;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// йҚөзӣӨж”ҜжҸҙ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
document.addEventListener('keydown',function(e){
  // еҰӮжһңз„Ұй»һеңЁ cv-inputпјҲж•ёеӯ—ијёе…ҘжЎҶпјүпјҢи®“зҖҸиҰҪеҷЁиҮӘе·ұиҷ•зҗҶ
  if(document.activeElement && document.activeElement.classList.contains('cv-input')) return;
  const onList=document.getElementById('page-list').classList.contains('active');
  const key=e.key;
  const code=e.code;
  // F20 еҜҰй«”ж•ёеӯ—йҚөзӣӨеҲҮжҸӣпјҡNUM = йҖЈзў°пјҢ/ = з«Ӣжҹұ
  // дёҚеҗҢйҚөзӣӨ/зҖҸиҰҪеҷЁеҸҜиғҪжҠҠ NUM еӣһе ұжҲҗ NumLockгҖҒNumpadClear жҲ– ClearпјҢжүҖд»Ҙе…ЁйғЁж”ҜжҸҙгҖӮ
  if(code==='NumLock' || key==='NumLock' || code==='NumpadClear' || key==='Clear'){
    e.preventDefault();
    switchMainMode('lp');
    return;
  }
  if(code==='NumpadDivide' || key==='/'){
    e.preventDefault();
    switchMainMode('p');
    return;
  }
  // жіЁж„ҸпјҡNumpadMultiply / * е·ІеҸ–ж¶ҲеҲҮжҸӣеҠҹиғҪпјҢйҒҝе…Қд»Қи·іеҲ°з«ӢжҹұгҖӮ
  if(key==='Tab'||key==='Enter'){
    e.preventDefault();
    const inManual = (kbFocus==='mn');
    const inPillar = (kbFocus==='p' || kbFocus==='pk');
    if(!inManual){
      // в”Җв”Җ йҖЈзў°/з«ӢжҹұжЁЎејҸ в”Җв”Җ
      if(kbFocus==='lpk' || kbFocus==='lp'){
        advanceLpCycle();
      } else if(kbFocus==='pk'){
        if(pillarKbIdx<pcols-1){ pillarKbIdx++; renderPPanel(); }
        else { setKbFocus('p'); const ps=Object.keys(pStars).map(Number).sort((a,b)=>a-b); if(ps.length) selectStar('p',ps[0]); }
      } else if(kbFocus==='p'){
        const stars=Object.keys(pStars).map(Number).sort((a,b)=>a-b);
        const cur=activeStarTarget['p'], idx=stars.indexOf(cur);
        if(idx>=0 && idx<stars.length-1){ selectStar('p',stars[idx+1]); }
        else {
          pillarKbIdx=0;
          setKbFocus('pk');
          if(inputMode!=='kb') inputMode='kb';
          renderPPanel();
        }
      }
    } else {
      // в”Җв”Җ жүӢеӢ•жЁЎејҸ в”Җв”Җ
      const s=Array.from({length:manualStarMax-1},(_,i)=>i+2);
      const i=s.indexOf(manualActiveR);
      if(manualInputField==='notes'){
        // жіЁж•ё вҶ’ еғ№ж ј
        manualInputField='price'; highlightManualR(); renderKbPanel2('kb');
      } else if(i<s.length-1){
        // еғ№ж ј вҶ’ дёӢдёҖжҳҹжіЁж•ё
        manualActiveR=s[i+1]; manualInputField='notes'; highlightManualR(); renderKbPanel2('kb');
      } else {
        // жүӢеӢ•жңҖеҫҢдёҖж ј вҶ’ еӣһеҲ°жүӢеӢ•з¬¬дёҖж јпјҲдәҢжҳҹжіЁж•ёпјү
        manualActiveR=2;
        manualInputField='notes';
        highlightManualR();
        renderKbPanel2('kb');
      }
    }
    return;
  }
  if(onList)return;
  // йқўжқҝй Ғ
  // F20/еҜҰй«”ж•ёеӯ—йҚөзӣӨзҡ„е°Ҹж•ёй»һеңЁйғЁеҲҶзҖҸиҰҪеҷЁжңғеӣһе ұпјҡ
  // code=NumpadDecimalпјҢдҪҶ key еҸҜиғҪжҳҜ DeleteгҖҒDecimalгҖҒ.гҖҒ,гҖӮ
  // еҝ…й Ҳе…ҲеҲӨж–· codeпјҢеҗҰеүҮжңғиў«дёӢйқў Delete жё…йҷӨеҠҹиғҪеҗғжҺүгҖӮ
  if(key>='0'&&key<='9'){pk(kbFocus,key);e.preventDefault();}
  else if(code==='NumpadDecimal' || key==='.' || key==='Decimal' || key===','){pk(kbFocus,'.');e.preventDefault();}
  else if(key==='Backspace'){pk(kbFocus,'DEL');e.preventDefault();}
  else if((key==='Delete' && code!=='NumpadDecimal')||key==='Escape'){pk(kbFocus,'C');e.preventDefault();}
  else if(key==='+'||key==='='){
    if(kbFocus==='lp')addToList('lp');
    else if(kbFocus==='p')addToList('p');
    else if(kbFocus==='mn')addToList('mn');
    e.preventDefault();
  }
  else if(key==='f'||key==='F'){
    const order=['lp','mn','p'];
    const i=order.indexOf(kbFocus);
    setKbFocus(order[(i+1)%order.length]);
    e.preventDefault();
  }
  else if(key==='ArrowDown'||key==='ArrowRight'){
    if(kbFocus==='mn'){const s=Array.from({length:manualStarMax-1},(_,i)=>i+2);const i=s.indexOf(manualActiveR);if(i<s.length-1){manualActiveR=s[i+1];highlightManualR();renderKbPanel2('kb');}}
    else if(kbFocus==='lpk'){ pkLpNum('OK'); }
    else{const stars=kbFocus==='lp'?Object.keys(lpStars).map(Number):Object.keys(pStars).map(Number);if(!stars.length)return;const cur=activeStarTarget[kbFocus];const idx=stars.indexOf(cur);selectStar(kbFocus,stars[(idx+1)%stars.length]);}
    e.preventDefault();
  }
  else if(key==='ArrowUp'||key==='ArrowLeft'){
    if(kbFocus==='mn'){const s=Array.from({length:manualStarMax-1},(_,i)=>i+2);const i=s.indexOf(manualActiveR);if(i>0){manualActiveR=s[i-1];highlightManualR();renderKbPanel2('kb');}}
    else if(kbFocus==='lpk'){ pkLpNum('DEL'); }
    else{const stars=kbFocus==='lp'?Object.keys(lpStars).map(Number):Object.keys(pStars).map(Number);if(!stars.length)return;const cur=activeStarTarget[kbFocus];const idx=stars.indexOf(cur);selectStar(kbFocus,stars[(idx-1+stars.length)%stars.length]);}
    e.preventDefault();
  }
});

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const APP_STATE_KEY = '539appStatePersistent_mobile_v3';
let __appStateSaveTimer = null;
let __appStateLoading = false;
function clonePlain(obj){ return JSON.parse(JSON.stringify(obj || {})); }
function saveAppState(){
  if(__appStateLoading) return;
  clearTimeout(__appStateSaveTimer);
  __appStateSaveTimer = setTimeout(()=>{
    try{
      const state={
        version:3,
        savedAt:Date.now(),
        kbFocus, tabOrigin,
        prices:clonePlain(prices),
        activeStarTarget:clonePlain(activeStarTarget),
        lpNum, lpKbInput, lpInputMode, lpStarMax, lpSubTab,
        manualActiveR, manualInputField, manualStarMax,
        manualNotes:clonePlain(manualNotes),
        manualPrices2:clonePlain(manualPrices2),
        pcols, maxNum, pStarMax, pvals:[...pvals], inputMode, pillarKbIdx, autoJump,
        listItems:clonePlain(listItems),
        listIdCounter
      };
      localStorage.setItem(APP_STATE_KEY, JSON.stringify(state));
    }catch(e){}
  }, 30);
}
function loadAppState(){
  try{
    const raw=localStorage.getItem(APP_STATE_KEY);
    if(!raw) return;
    const s=JSON.parse(raw);
    if(!s || typeof s!=='object') return;
    __appStateLoading=true;
    if(s.prices){ prices.lp={...(s.prices.lp||{})}; prices.p={...(s.prices.p||{})}; }
    if(s.activeStarTarget){ activeStarTarget.lp=s.activeStarTarget.lp??null; activeStarTarget.p=s.activeStarTarget.p??null; }
    if(typeof s.kbFocus==='string') kbFocus=s.kbFocus;
    if(typeof s.tabOrigin==='string') tabOrigin=s.tabOrigin;
    if(Number.isFinite(+s.lpNum)) lpNum=+s.lpNum;
    if(typeof s.lpKbInput==='string') lpKbInput=s.lpKbInput;
    if(typeof s.lpInputMode==='string') lpInputMode=s.lpInputMode;
    if(Number.isFinite(+s.lpStarMax)) lpStarMax=Math.max(2,Math.min(9,+s.lpStarMax));
    if(typeof s.lpSubTab==='string') lpSubTab=s.lpSubTab;
    if(Number.isFinite(+s.manualActiveR)) manualActiveR=Math.max(2,Math.min(9,+s.manualActiveR));
    if(typeof s.manualInputField==='string') manualInputField=s.manualInputField;
    if(Number.isFinite(+s.manualStarMax)) manualStarMax=Math.max(2,Math.min(9,+s.manualStarMax));
    if(s.manualNotes) Object.assign(manualNotes, s.manualNotes);
    if(s.manualPrices2) Object.assign(manualPrices2, s.manualPrices2);
    if(Number.isFinite(+s.pcols)) pcols=Math.max(2,Math.min(10,+s.pcols));
    if(Number.isFinite(+s.maxNum)) maxNum=Math.max(1,Math.min(99,+s.maxNum));
    if(Number.isFinite(+s.pStarMax)) pStarMax=Math.max(2,Math.min(9,+s.pStarMax));
    if(Array.isArray(s.pvals)){ pvals=s.pvals.slice(0,pcols).map(v=>Math.max(0,Math.min(maxNum,parseInt(v)||0))); while(pvals.length<pcols)pvals.push(1); }
    if(typeof s.inputMode==='string') inputMode=s.inputMode;
    if(Number.isFinite(+s.pillarKbIdx)) pillarKbIdx=Math.max(0,Math.min(pcols-1,+s.pillarKbIdx));
    if(typeof s.autoJump==='boolean') autoJump=s.autoJump;
    if(Array.isArray(s.listItems)) listItems=s.listItems;
    if(Number.isFinite(+s.listIdCounter)) listIdCounter=+s.listIdCounter;
  }catch(e){}
  finally{ __appStateLoading=false; }
}
function installAppAutoSave(){
  const names=['setPage','setKbFocus','selectStar','pk','setLpSubTab','setLpInputMode','setLpNum','adjLpStar','setLpStarDirect','pkLpNum','switchMainMode','advanceLpCycle','adjManualStar','selectManualR','pkManual','adjCols','setColsDirect','adjMaxNum','setMaxNumDirect','adjPStar','setPStarDirect','setInputMode','setPillarKbIdx','setPVal','setPvalDirect','pkPillar','addToList','delItem','clearList'];
  names.forEach(name=>{
    const fn=window[name];
    if(typeof fn==='function' && !fn.__autosaveWrapped){
      const wrapped=function(...args){ const ret=fn.apply(this,args); saveAppState(); return ret; };
      wrapped.__autosaveWrapped=true;
      window[name]=wrapped;
    }
  });
  document.addEventListener('input',()=>saveAppState(),true);
  document.addEventListener('change',()=>saveAppState(),true);
  document.addEventListener('click',()=>setTimeout(saveAppState,0),true);
  window.addEventListener('beforeunload',()=>{ try{localStorage.setItem(APP_STATE_KEY, localStorage.getItem(APP_STATE_KEY)||'{}');}catch(e){} saveAppState(); });
}
